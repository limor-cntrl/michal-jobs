  .job-card.social { border-right-color: #fdcb6e; }

  .job-card.hidden-job.show-hidden { display: block; }
  .job-title { font-size: 1.15em; font-weight: bold; margin-bottom: 5px; }
  .job-title a { color: #2d3436; text-decoration: none; }
  .job-title a:hover { color: #0984e3; text-decoration: underline; }
  .job-company { color: #636e72; font-size: 0.95em; margin-bottom: 8px; }
  .job-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }

  .job-tag.new { background: #55efc4; color: #00b894; font-weight: bold; }
  .job-tag.score-high { background: #55efc4; color: #00b894; }
  .job-tag.score-med { background: #ffeaa7; color: #fdcb6e; }
  .job-description { font-size: 0.9em; color: #636e72; line-height: 1.5; }
  .job-actions { margin-top: 10px; display: flex; gap: 8px; }
  .btn-apply { padding: 6px 16px; border-radius: 8px; border: none; background: #0984e3; color: white; cursor: pointer; font-size: 0.85em; text-decoration: none; display: inline-block; }

  .btn-hide { padding: 6px 16px; border-radius: 8px; border: 1px solid #dfe6e9; background: white; cursor: pointer; font-size: 0.85em; color: #636e72; }

  .quote-card { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; text-align: center; max-width: 900px; margin-left: auto; margin-right: auto; }

// --- Render Logic ---
const hiddenJobs = JSON.parse(localStorage.getItem('hiddenJobs') || '[]');
let currentFilter = 'all';
let showHidden = false;

function toggleHidden() {
  showHidden = !showHidden;
  const btn = document.getElementById('toggleHidden');
  btn.classList.toggle('showing', showHidden);
  btn.textContent = showHidden ? 'הסתר מוסתרים' : 'הצג מוסתרים';
  renderJobs();
}

function hideJob(id) {
  if (!hiddenJobs.includes(id)) {
    hiddenJobs.push(id);
    localStorage.setItem('hiddenJobs', JSON.stringify(hiddenJobs));
  }
  renderJobs();
}

function unhideJob(id) {
  const idx = hiddenJobs.indexOf(id);
  if (idx > -1) { hiddenJobs.splice(idx, 1); localStorage.setItem('hiddenJobs', JSON.stringify(hiddenJobs)); }
  renderJobs();
}

function renderStats() {
  const visible = JOBS.filter(j => !hiddenJobs.includes(j.id));
  const counts = { ngo: 0, admin: 0, hebrew: 0, social: 0 };
  visible.forEach(j => { if (counts[j.category] !== undefined) counts[j.category]++; });
  document.getElementById('statsContainer').innerHTML = `
    <div class="stat-card stat-total"><div class="number">${visible.length}</div><div class="label">סה"כ משרות</div></div>
    <div class="stat-card stat-ngo"><div class="number">${counts.ngo}</div><div class="label">NGO / מדיניות</div></div>
    <div class="stat-card stat-admin"><div class="number">${counts.admin}</div><div class="label">אדמיניסטרציה</div></div>
    <div class="stat-card stat-hebrew"><div class="number">${counts.hebrew}</div><div class="label">עברית</div></div>
    <div class="stat-card stat-social"><div class="number">${counts.social}</div><div class="label">צרפתית</div></div>
  `;
}

function renderJobs() {
  renderStats();
  const container = document.getElementById('jobsContainer');
  let filtered = JOBS;
  if (currentFilter !== 'all') filtered = JOBS.filter(j => j.category === currentFilter);

  // Sort: new first, then by matchScore desc
  filtered.sort((a, b) => {
    if (a.isNew && !b.isNew) return -1;
    if (!a.isNew && b.isNew) return 1;
    return b.matchScore - a.matchScore;
  });

  let html = '';
  filtered.forEach(j => {
    const isHidden = hiddenJobs.includes(j.id);
    if (isHidden && !showHidden) return;
    const scoreClass = j.matchScore >= 80 ? 'score-high' : 'score-med';
    html += `
      <div class="job-card ${j.category} ${isHidden ? 'hidden-job show-hidden' : ''}">
        <div class="job-title"><a href="${j.url}" target="_blank">${j.title}</a></div>
        <div class="job-company">${j.company}</div>
        <div class="job-meta">
          ${j.isNew ? '<span class="job-tag new">חדש!</span>' : ''}
          <span class="job-tag ${scoreClass}">התאמה: ${j.matchScore}%</span>
          <span class="job-tag">${j.location}</span>
          <span class="job-tag">${j.type}</span>
          ${j.remote ? '<span class="job-tag">🏠 remote</span>' : ''}
          ${j.deadline ? '<span class="job-tag">⏰ ' + j.deadline + '</span>' : ''}
        </div>
        <div class="job-description">${j.description}</div>
        <div class="job-actions">
          <a href="${j.url}" target="_blank" class="btn-apply">📄 הגש מועמדות</a>
          ${isHidden
            ? '<button class="btn-hide" onclick="unhideJob(' + j.id + ')">↩️ שחזר</button>'
            : '<button class="btn-hide" onclick="hideJob(' + j.id + ')">🙈 הסתר</button>'}
        </div>
      </div>
    `;
  });

  if (!html) html = '<div class="no-results">אין משרות בקטגוריה הזו כרגע</div>';
  container.innerHTML = html;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderJobs();
  });
});

// Last updated
document.getElementById('lastUpdated').textContent = 'עדכון אחרון: ' + LAST_UPDATED;

// Initial render
renderJobs();
