];

document.getElementById('quoteCard').textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];

let activeCategory = 'all';
let showHidden = false;

function setFilter(btn) {
  if (btn.dataset.cat === 'hidden') return;
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (b.dataset.cat !== 'hidden') b.classList.remove('active');
  });
  btn.classList.add('active');
  activeCategory = btn.dataset.cat;
  filterJobs();
}

function toggleHidden() {
  showHidden = !showHidden;
  const btn = document.querySelector('[data-cat="hidden"]');
  btn.classList.toggle('active', showHidden);
  filterJobs();
}

function filterJobs() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cards = document.querySelectorAll('.job-card');
  cards.forEach(card => {
    const cat = card.dataset.category;
    const text = card.textContent.toLowerCase();
    const matchCat = activeCategory === 'all' || cat === activeCategory;
    const matchSearch = !search || text.includes(search);
    card.style.display = (matchCat && matchSearch) ? '' : 'none';
  });
  updateStats();
}

function updateStats() {
  const counts = { ngo: 0, admin: 0, hebrew: 0, social: 0 };
  JOBS.forEach(j => { if (counts[j.category] !== undefined) counts[j.category]++; });
  document.getElementById('statsContainer').innerHTML = `
    <div class="stat-card stat-ngo"><div class="number">${counts.ngo}</div><div class="label">NGO / זכויות אדם</div></div>
    <div class="stat-card stat-admin"><div class="number">${counts.admin}</div><div class="label">אדמיניסטרציה</div></div>
    <div class="stat-card stat-hebrew"><div class="number">${counts.hebrew}</div><div class="label">עברית</div></div>
    <div class="stat-card stat-social"><div class="number">${counts.social}</div><div class="label">צרפתית / חברתי</div></div>
  `;
}

function renderJobs() {
  const grid = document.getElementById('jobsGrid');
  const sorted = [...JOBS].sort((a, b) => b.matchScore - a.matchScore);
  grid.innerHTML = sorted.map(j => {
    const scoreClass = j.matchScore >= 80 ? 'score-high' : 'score-med';
    const catLabels = { ngo: 'NGO', admin: 'אדמיניסטרציה', hebrew: 'עברית', social: 'צרפתית' };
    return `
      <div class="job-card cat-${j.category}" data-category="${j.category}">
        ${j.isNew ? '<span class="new-tag">חדש!</span>' : ''}
        <span class="badge badge-${j.category}">${catLabels[j.category] || j.category}</span>
        <h3>${j.title}</h3>
        <div class="company">${j.company}</div>
        <div class="meta">
          <span>${j.location}</span>
          <span>${j.type}</span>
          ${j.remote ? '<span>🏠 היברידי/מרחוק</span>' : ''}
          ${j.deadline ? '<span>דדליין: ' + j.deadline + '</span>' : ''}
        </div>
        <div class="description">${j.description}</div>
        <span class="score ${scoreClass}">התאמה: ${j.matchScore}%</span>
        <a href="${j.url}" target="_blank" class="apply-btn">הגש מועמדות ←</a>
      </div>
    `;
  }).join('');
  updateStats();
}

renderJobs();
