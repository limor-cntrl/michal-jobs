  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

  .header {

  .header h1 {

    background: linear-gradient(90deg, #667eea, #764ba2);

  }

  .header .subtitle { font-size: 0.9em; color: #999; margin-top: 4px; }
  .header .date { font-size: 0.85em; color: #888; }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px 40px; }

  .stats-bar {
    display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }

  .stat-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 24px;
    flex: 1;
    min-width: 140px;
    text-align: center;
  }

  .stat-card .number { font-size: 2em; font-weight: 700; color: #667eea; }
  .stat-card .label { font-size: 0.8em; color: #999; margin-top: 4px; }

  .filters {
    display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center;
  }

  .filter-btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 0.85em;
    transition: all 0.2s;
  }

  .filter-btn:hover { background: rgba(255,255,255,0.1); }
  .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }

  .search-input {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: #e0e0e0;
    font-family: 'Heebo', sans-serif;
    font-size: 0.85em;
    outline: none;
    width: 220px;
    direction: ltr;
    text-align: right;
  }

  .search-input::placeholder { color: #777; }

  .jobs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .job-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .job-card:hover {
    transform: translateY(-2px);
    border-color: rgba(102,126,234,0.4);
    box-shadow: 0 8px 32px rgba(102,126,234,0.15);
  }

  .job-card.hidden-card { opacity: 0.3; }

  .job-card .new-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
    font-size: 0.7em;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
  }

  .job-card .match-score {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 0.75em;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    direction: ltr;
  }

  .score-high { background: rgba(76,175,80,0.2); color: #81c784; }
  .score-medium { background: rgba(255,183,77,0.2); color: #ffb74d; }
  .score-low { background: rgba(229,115,115,0.2); color: #ef9a9a; }

  .job-card .category-tag {
    display: inline-block;
    font-size: 0.7em;
    padding: 2px 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    margin-top: 6px;
  }

  .cat-ngo { background: rgba(102,126,234,0.2); color: #90a4f4; }
  .cat-social { background: rgba(156,39,176,0.2); color: #ce93d8; }
  .cat-education { background: rgba(0,188,212,0.2); color: #80deea; }
  .cat-tech { background: rgba(255,152,0,0.2); color: #ffcc80; }
  .cat-other { background: rgba(158,158,158,0.2); color: #bdbdbd; }

  .job-card h3 { font-size: 1.05em; font-weight: 600; color: #e8e8e8; margin-bottom: 6px; line-height: 1.4; }
  .job-card .company { font-size: 0.9em; color: #a8a8d8; font-weight: 500; margin-bottom: 8px; }
  .job-card .description { font-size: 0.82em; color: #999; line-height: 1.5; margin-bottom: 12px; }

  .job-card .meta {
    display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.78em; color: #888; margin-bottom: 12px;
  }

  .job-card .meta span { display: flex; align-items: center; gap: 4px; }

  .job-card .actions {
    display: flex; gap: 8px; justify-content: flex-end;
  }

  .btn-apply {
    padding: 6px 16px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-family: 'Heebo', sans-serif;
    font-size: 0.82em;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .btn-hide {
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: #888;
    font-family: 'Heebo', sans-serif;
    font-size: 0.82em;

    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid rgba(76,175,80,0.3);
    background: rgba(76,175,80,0.1);
    color: #81c784;
    font-family: 'Heebo', sans-serif;
    font-size: 0.82em;
    cursor: pointer;

  }

  .btn-cv.sent { background: rgba(76,175,80,0.3); color: #a5d6a7; }

    margin-top: 30px;

    background: rgba(255,255,255,0.03);

    text-align: center;
    font-style: italic;
    color: #888;

    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);

    font-family: 'Heebo', sans-serif;

    description: "ניהול פרויקט Child Growth Monitor ב-Welthungerhilfe. עבודה מהבית עם פגישות במשרדי בון וברלין. דורש 3-4 שנות ניסיון."
  }
];

const QUOTES = [
  "\"הדרך הטובה ביותר לחזות את העתיד היא ליצור אותו.\" — פיטר דרוקר",
  "\"כל מומחה פעם היה מתחיל.\" — הלן הייז",
  "\"ההצלחה היא לא סופית, הכישלון אינו קטלני: האומץ להמשיך הוא מה שחשוב.\" — וינסטון צ'רצ'יל",
  "\"אל תחכי להזדמנות. צרי אותה.\" — ג'ורג' ברנרד שו",
  "\"הכישרון שלך קובע מה את יכולה לעשות. המוטיבציה שלך קובעת כמה את מוכנה לעשות. הגישה שלך קובעת כמה טוב את עושה את זה.\" — לו הולץ",
  "\"כל יום הוא הזדמנות חדשה. את יכולה לבנות על אתמול, או לשים את זה מאחור ולהתחיל מחדש. זה מה שמחר בשבילו.\" — בוב מרלי",
  "\"אי אפשר לחזור אחורה ולשנות את ההתחלה, אבל אפשר להתחיל מאיפה שאת ולשנות את הסוף.\" — סי.אס. לואיס"
];

function App() {
  const [filter, setFilter] = React.useState("all");
  const [search, setSearch] = React.useState("");
  const [hiddenJobs, setHiddenJobs] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("hiddenJobs") || "[]"); } catch { return []; }
  });
  const [cvSent, setCvSent] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("cvSent") || "[]"); } catch { return []; }
  });
  const [showHidden, setShowHidden] = React.useState(false);

  const todayQuote = QUOTES[new Date().getDay() % QUOTES.length];

  const toggleHide = (id) => {
    const next = hiddenJobs.includes(id) ? hiddenJobs.filter(x => x !== id) : [...hiddenJobs, id];
    setHiddenJobs(next);
    try { localStorage.setItem("hiddenJobs", JSON.stringify(next)); } catch {}
  };

  const toggleCv = (id) => {
    const next = cvSent.includes(id) ? cvSent.filter(x => x !== id) : [...cvSent, id];
    setCvSent(next);
    try { localStorage.setItem("cvSent", JSON.stringify(next)); } catch {}
  };

  const filteredJobs = JOBS.filter(job => {
    if (!showHidden && hiddenJobs.includes(job.id)) return false;
    if (filter !== "all" && job.category !== filter) return false;
    if (search) {
      const s = search.toLowerCase();
      return job.title.toLowerCase().includes(s) || job.company.toLowerCase().includes(s) || job.description.includes(s);
    }
    return true;
  });

  const categories = { all: "הכל", ngo: "NGO / בינלאומי", social: "חברתי", education: "חינוך", tech: "טכנולוגיה" };

  const scoreClass = (s) => s >= 85 ? "score-high" : s >= 75 ? "score-medium" : "score-low";
  const catClass = (c) => `cat-${c}`;
  const catLabel = { ngo: "NGO / בינלאומי", social: "חברתי", education: "חינוך", tech: "טכנולוגיה", other: "אחר" };

  const activeCount = JOBS.filter(j => !hiddenJobs.includes(j.id)).length;
  const newCount = JOBS.filter(j => j.isNew && !hiddenJobs.includes(j.id)).length;
  const cvCount = cvSent.length;
  const urgentCount = JOBS.filter(j => {
    if (!j.deadline || hiddenJobs.includes(j.id)) return false;
    const d = new Date(j.deadline);
    const now = new Date();
    return (d - now) / (1000*60*60*24) <= 14 && d >= now;
  }).length;

  return (
    React.createElement(React.Fragment, null,
      React.createElement("div", { className: "header" },
        React.createElement("div", null,
          React.createElement("h1", null, "לוח המשרות של מיכל"),
          React.createElement("div", { className: "subtitle" }, "חיפוש עבודה בברלין | זכויות אדם, מדיניות, אדבוקסי, NGO")
        ),
        React.createElement("div", { className: "date" }, "עדכון אחרון: " + LAST_UPDATED)
      ),
      React.createElement("div", { className: "container" },
        React.createElement("div", { className: "stats-bar" },
          React.createElement("div", { className: "stat-card" },
            React.createElement("div", { className: "number" }, activeCount),
            React.createElement("div", { className: "label" }, "משרות פעילות")
          ),
          React.createElement("div", { className: "stat-card" },
            React.createElement("div", { className: "number", style: { color: "#f5576c" } }, newCount),
            React.createElement("div", { className: "label" }, "חדשות היום")
          ),
          React.createElement("div", { className: "stat-card" },
            React.createElement("div", { className: "number", style: { color: "#81c784" } }, cvCount),
            React.createElement("div", { className: "label" }, "קו\"ח נשלחו")
          ),
          React.createElement("div", { className: "stat-card" },
            React.createElement("div", { className: "number", style: { color: "#ffb74d" } }, urgentCount),
            React.createElement("div", { className: "label" }, "דד-ליין קרוב")
          )
        ),
        React.createElement("div", { className: "filters" },
          Object.entries(categories).map(([key, label]) =>
            React.createElement("button", {
              key: key,
              className: "filter-btn" + (filter === key ? " active" : ""),
              onClick: () => setFilter(key)
            }, label)
          ),
          React.createElement("input", {
            className: "search-input",
            placeholder: "חיפוש...",
            value: search,
            onChange: (e) => setSearch(e.target.value)
          }),
          React.createElement("button", {
            className: "toggle-hidden",
            onClick: () => setShowHidden(!showHidden)
          }, showHidden ? "הסתר מוסתרות" : "הצג מוסתרות (" + hiddenJobs.length + ")")
        ),
        filteredJobs.length === 0
          ? React.createElement("div", { className: "empty-state" },
              React.createElement("div", { className: "emoji" }, "🔍"),
              React.createElement("p", null, "לא נמצאו משרות מתאימות לסינון הנוכחי")
            )
          : React.createElement("div", { className: "jobs-grid" },
              filteredJobs
                .sort((a, b) => b.matchScore - a.matchScore)
                .map(job =>
                  React.createElement("div", {
                    key: job.id,
                    className: "job-card" + (hiddenJobs.includes(job.id) ? " hidden-card" : "")
                  },
                    job.isNew && React.createElement("span", { className: "new-badge" }, "חדש!"),
                    React.createElement("span", { className: "match-score " + scoreClass(job.matchScore) }, job.matchScore + "% התאמה"),
                    React.createElement("span", { className: "category-tag " + catClass(job.category) }, catLabel[job.category] || job.category),
                    React.createElement("h3", null, job.title),
                    React.createElement("div", { className: "company" }, job.company),
                    React.createElement("div", { className: "description" }, job.description),
                    React.createElement("div", { className: "meta" },
                      React.createElement("span", null, "📍 " + job.location),
                      React.createElement("span", null, "⏰ " + job.type),
                      job.remote && React.createElement("span", null, "🏠 עבודה מרחוק"),
                      job.deadline && React.createElement("span", { style: { color: "#ffb74d" } }, "⚠️ דד-ליין: " + job.deadline)
                    ),
                    React.createElement("div", { className: "actions" },
                      React.createElement("a", { className: "btn-apply", href: job.url, target: "_blank", rel: "noopener" }, "הגשת מועמדות"),
                      React.createElement("button", {
                        className: "btn-cv" + (cvSent.includes(job.id) ? " sent" : ""),
                        onClick: () => toggleCv(job.id)
                      }, cvSent.includes(job.id) ? "✓ קו\"ח נשלח" : "סמן קו\"ח"),
                      React.createElement("button", {
                        className: "btn-hide",
                        onClick: () => toggleHide(job.id)
                      }, hiddenJobs.includes(job.id) ? "הצג" : "הסתר")
                    )
                  )
                )
            ),
        React.createElement("div", { className: "quote-bar" }, todayQuote)
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
