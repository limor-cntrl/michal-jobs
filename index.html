// ============================================
// APP LOGIC — אל תשנה מכאן למטה
// ============================================
let currentFilter = 'all';
let searchQuery = '';
let showHidden = false;
let hiddenJobs = JSON.parse(localStorage.getItem('hiddenJobs') || '[]');

function getStats() {
  const visible = JOBS.filter(j => !hiddenJobs.includes(j.id));
  return {
    total: visible.length,
    ngo: visible.filter(j => j.category === 'ngo').length,
    admin: visible.filter(j => j.category === 'admin').length,
    hebrew: visible.filter(j => j.category === 'hebrew').length,
    social: visible.filter(j => j.category === 'social').length,
    newJobs: visible.filter(j => j.isNew).length,
  };
}

function renderStats() {
  const s = getStats();
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="number">${s.total}</div><div class="label">סה"כ משרות</div></div>
    <div class="stat-card"><div class="number" style="color:#ef4444">${s.newJobs}</div><div class="label">חדשות</div></div>
    <div class="stat-card ngo"><div class="number">${s.ngo}</div><div class="label">NGO / מדיניות</div></div>
    <div class="stat-card admin"><div class="number">${s.admin}</div><div class="label">אדמיניסטרציה</div></div>
    <div class="stat-card hebrew"><div class="number">${s.hebrew}</div><div class="label">עברית</div></div>
    <div class="stat-card social"><div class="number">${s.social}</div><div class="label">צרפתית</div></div>
  `;
  document.getElementById('lastUpdated').textContent = `עדכון אחרון: ${LAST_UPDATED}`;
}

function renderJobs() {
  const container = document.getElementById('jobsContainer');
  let filtered = JOBS.filter(j => {
    if (currentFilter !== 'all' && j.category !== currentFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return (j.title + j.company + j.description + j.category).toLowerCase().includes(q);
    }
    return true;
  });

  filtered.sort((a, b) => b.matchScore - a.matchScore);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>לא נמצאו משרות</h3><p>נסי לשנות את הפילטר או את החיפוש</p></div>';
    return;
  }

  container.innerHTML = filtered.map(job => {
    const isHidden = hiddenJobs.includes(job.id);
    const hiddenClass = isHidden ? (showHidden ? 'quote-card show-hidden' : 'quote-card hidden-job') : 'quote-card';
    const scoreClass = job.matchScore >= 80 ? 'high' : 'medium';

    return `
      <div class="${hiddenClass}" data-id="${job.id}">
        ${job.isNew ? '<div class="new-badge">חדש!</div>' : ''}
        <div class="category-tag ${job.category}">${getCategoryLabel(job.category)}</div>
        <h3>${job.title}</h3>
        <div class="company">${job.company}</div>
        <div class="description">${job.description}</div>
        <div class="meta">
          <span>${job.location}</span>
          <span>${job.type}</span>
          ${job.remote ? '<span>🏠 remote</span>' : ''}
          ${job.deadline ? '<span>⏰ ' + job.deadline + '</span>' : ''}
          <span>נמצא: ${job.dateFound}</span>
        </div>
        <div class="match-score">
          <div class="match-bar"><div class="match-fill ${scoreClass}" style="width:${job.matchScore}%"></div></div>
          <div class="match-label">${job.matchScore}%</div>
        </div>
        <div class="card-actions">
          <a href="${job.url}" target="_blank" class="btn-apply">פתח משרה ←</a>
          <button class="btn-hide" onclick="toggleJobHidden(${job.id})">${isHidden ? 'הצג' : 'הסתר'}</button>
        </div>
      </div>
    `;
  }).join('');
}

function getCategoryLabel(cat) {
  const labels = { ngo: 'NGO / מדיניות', admin: 'אדמיניסטרציה', hebrew: 'עברית', social: 'צרפתית' };
  return labels[cat] || cat;
}

function filterJobs(category) {
  currentFilter = category;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderJobs();
}

function searchJobs(query) {
  searchQuery = query;
  renderJobs();
}

function toggleHidden() {
  showHidden = !showHidden;
  renderJobs();
}

function toggleJobHidden(id) {
  if (hiddenJobs.includes(id)) {
    hiddenJobs = hiddenJobs.filter(i => i !== id);
  } else {
    hiddenJobs.push(id);
  }
  localStorage.setItem('hiddenJobs', JSON.stringify(hiddenJobs));
  renderStats();
  renderJobs();
}

// Init
renderStats();
renderJobs();
</script>
