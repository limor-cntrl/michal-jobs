// ─── render ───────────────────────────────────────────────────────────────
function getScoreClass(score) {
  if (score >= 85) return 'high';
  if (score >= 75) return 'medium';
  return '';
}

function typeLabel(type) {
  if (type === 'parttime') return '<span class="job-tag parttime">⏰ חלקי</span>';
  if (type === 'fulltime') return '<span class="job-tag fulltime">💼 מלא</span>';
  return '<span class="job-tag hybrid">🔀 היברידי</span>';
}

function categoryLabel(cat) {
  const map = {
    track1: '🎓 Track 1 – התמחות',
    track2: '🌐 Track 2 – אנגלית',
    track3: '✡️ Track 3 – עברית',
    track4: '🇫🇷 Track 4 – צרפתית'
  };
  return map[cat] || cat;
}

function buildCard(job) {
  const urgentClass = job.urgent ? ' is-urgent' : (job.isNew ? ' is-new' : '');
  const newBadge = job.isNew ? (job.urgent
    ? '<span class="badge-urgent">⚠️ דד-ליין קרוב</span>'
    : '<span class="badge-new">✨ חדש</span>') : '';
  const scoreClass = getScoreClass(job.matchScore);
  const deadlineTag = job.deadline
    ? `<span class="job-tag deadline">📅 דד-ליין: ${job.deadline}</span>` : '';

  return `
  <div class="job-card${urgentClass}" data-category="${job.category}" data-type="${job.type}" data-score="${job.matchScore}" data-new="${job.isNew}">
    <div class="job-header">
      <div class="job-title">${newBadge}${job.title}</div>
      <div class="match-score ${scoreClass}">${job.matchScore}% התאמה</div>
    </div>
    <div class="job-company">🏢 ${job.company}</div>
    <div class="job-meta">
      <span class="job-tag">📍 ${job.location}</span>
      ${typeLabel(job.type)}
      ${deadlineTag}
      <span class="job-tag">🏷️ ${job.field}</span>
    </div>
    <div class="job-desc">${job.description}</div>
    <div class="job-footer">
      <div>
        <div class="job-source">מקור: ${job.source}</div>
        <div class="date-found">נמצא: ${job.dateFound}</div>
      </div>
      <a href="${job.link}" target="_blank" class="apply-btn">הגש מועמדות ←</a>
    </div>
  </div>`;
}

function filterJobs(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderJobs(filter);
}

function renderJobs(filter = 'all') {
  const container = document.getElementById('main-content');
  const tracks = { track1: [], track2: [], track3: [], track4: [] };
  const trackNames = {
    track1: 'Track 1 – תפקידי התמחות (זכויות אדם, מדיניות, NGO)',
    track2: 'Track 2 – תפקידים אנגלופוניים גמישים',
    track3: 'Track 3 – תפקידים דוברי עברית',
    track4: 'Track 4 – תפקידים דוברי צרפתית'
  };
  const trackIcons = { track1: '🎓', track2: '🌐', track3: '✡️', track4: '🇫🇷' };

  let filtered = JOBS.filter(j => {
    if (filter === 'all') return true;
    if (filter === 'new') return j.isNew;
    if (filter === 'parttime') return j.type === 'parttime';
    if (filter === 'high') return j.matchScore >= 85;
    return j.category === filter;
  });

  filtered.forEach(j => {
    if (!tracks[j.category]) tracks[j.category] = [];
    tracks[j.category].push(j);
  });

  let html = '';
  if (filter === 'all' || filter === 'new' || filter === 'parttime' || filter === 'high') {
    Object.keys(tracks).forEach(cat => {
      if (tracks[cat].length === 0) return;
      tracks[cat].sort((a, b) => b.matchScore - a.matchScore);
      html += `<div class="section-title"><span class="section-icon">${trackIcons[cat]}</span>${trackNames[cat]}</div>`;
      html += `<div class="job-grid">${tracks[cat].map(buildCard).join('')}</div>`;
    });
  } else {
    const cat = filter;
    const jobs = (tracks[cat] || []).sort((a, b) => b.matchScore - a.matchScore);
    html += `<div class="section-title"><span class="section-icon">${trackIcons[cat]}</span>${trackNames[cat]}</div>`;
    html += `<div class="job-grid">${jobs.map(buildCard).join('')}</div>`;
  }

  if (!html) html = '<p style="padding:32px;color:#a0aec0;text-align:center;">לא נמצאו משרות בסינון זה.</p>';
  container.innerHTML = html;
}

function updateStats() {
  document.getElementById('total-count').textContent = JOBS.length;
  document.getElementById('new-count').textContent = JOBS.filter(j => j.isNew).length;
  document.getElementById('parttime-count').textContent = JOBS.filter(j => j.type === 'parttime').length;
  document.getElementById('top-count').textContent = JOBS.filter(j => j.matchScore >= 85).length;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ─── init ──────────────────────────────────────────────────────────────────
renderJobs('all');
updateStats();
document.getElementById('footer-last-updated').textContent = 'עדכון אחרון: ' + formatDate(LAST_UPDATED);
</script>
</body>
</html>
