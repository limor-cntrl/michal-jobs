<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דשבורד חיפוש עבודה - מיכל זיו</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    direction: rtl;
  }

  .header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid #334155;
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: #f8fafc;
  }

  .header .subtitle {
    font-size: 14px;
    color: #94a3b8;
    margin-top: 4px;
  }

  .last-updated {
    font-size: 13px;
    color: #64748b;
    background: #1e293b;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #334155;
  }

  .controls {
    background: #1e293b;
    padding: 15px 30px;
    border-bottom: 1px solid #334155;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #475569;
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: #60a5fa; color: #60a5fa; }
  .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

  .search-box {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #475569;
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    width: 220px;
    direction: ltr;
    text-align: right;
  }

  .search-box::placeholder { color: #64748b; }

  .stats-bar {
    display: flex;
    gap: 15px;
    padding: 15px 30px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 12px 20px;
    flex: 1;
    min-width: 140px;
    text-align: center;
  }

  .stat-card .number { font-size: 28px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: #94a3b8; margin-top: 2px; }

  .stat-card.ngo .number { color: #34d399; }
  .stat-card.admin .number { color: #60a5fa; }
  .stat-card.hebrew .number { color: #f472b6; }
  .stat-card.french .number { color: #a78bfa; }
  .stat-card.total .number { color: #fbbf24; }

  .jobs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
    padding: 20px 30px;
  }

  .job-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .job-card:hover { border-color: #60a5fa; transform: translateY(-2px); }
  .job-card.hidden { display: none; }

  .job-card .category-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .category-tag.ngo { background: #065f46; color: #6ee7b7; }
  .category-tag.admin { background: #1e3a5f; color: #93c5fd; }
  .category-tag.hebrew { background: #701a5a; color: #f9a8d4; }
  .category-tag.social { background: #4c1d95; color: #c4b5fd; }

  .job-card .new-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #ef4444;
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .job-card h3 {
    font-size: 16px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .job-card .company {
    font-size: 14px;
    color: #60a5fa;
    margin-bottom: 8px;
  }

  .job-card .description {
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .job-card .meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 12px;
    color: #64748b;
    margin-bottom: 12px;
  }

  .job-card .match-score {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
  }

  .match-score.high { color: #34d399; }
  .match-score.medium { color: #fbbf24; }

  .apply-btn {
    display: inline-block;
    padding: 8px 20px;
    background: #3b82f6;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s;
  }

  .apply-btn:hover { background: #2563eb; }

  .quote-card {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 30px;
    margin: 20px 30px;
    text-align: center;
  }

  .quote-card .quote {
    font-size: 18px;
    font-style: italic;
    color: #cbd5e1;
    line-height: 1.6;
  }

  .quote-card .author {
    font-size: 13px;
    color: #64748b;
    margin-top: 10px;
  }

  .toggle-hidden-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #475569;
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    margin-right: auto;
  }

  @media (max-width: 768px) {
    .jobs-grid { grid-template-columns: 1fr; padding: 10px 15px; }
    .header, .controls, .stats-bar { padding-right: 15px; padding-left: 15px; }
  }
</style>

<div class="header">

    <div class="subtitle">ברלין | אנגלית, עברית, צרפתית | ללא גרמנית</div>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<div class="controls">

  <button class="filter-btn" data-filter="social">צרפתית</button>
  <input type="text" class="search-box" id="searchBox" placeholder="חיפוש חופשי...">
  <button class="toggle-hidden-btn" id="toggleHidden" onclick="toggleHidden()">הצג/הסתר משרות ישנות</button>

// ===== APP LOGIC =====
let activeFilter = 'all';
let showHidden = false;
let searchQuery = '';

function toggleHidden() {
  showHidden = !showHidden;
  renderJobs();
}

function renderStats() {
  const counts = { ngo: 0, admin: 0, hebrew: 0, social: 0, total: 0 };
  JOBS.forEach(j => {
    counts[j.category] = (counts[j.category] || 0) + 1;
    counts.total++;
  });

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card total"><div class="number">${counts.total}</div><div class="label">סה"כ משרות</div></div>
    <div class="stat-card ngo"><div class="number">${counts.ngo}</div><div class="label">NGO / זכויות אדם</div></div>
    <div class="stat-card admin"><div class="number">${counts.admin}</div><div class="label">אדמיניסטרציה</div></div>
    <div class="stat-card hebrew"><div class="number">${counts.hebrew}</div><div class="label">עברית</div></div>
    <div class="stat-card french"><div class="number">${counts.social}</div><div class="label">צרפתית</div></div>
  `;
}

function renderJobs() {
  const grid = document.getElementById('jobsGrid');
  const filtered = JOBS.filter(j => {
    if (activeFilter !== 'all' && j.category !== activeFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const searchable = `${j.title} ${j.company} ${j.description} ${j.location}`.toLowerCase();
      if (!searchable.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => b.matchScore - a.matchScore);

  grid.innerHTML = filtered.map(j => `
    <div class="job-card" data-category="${j.category}">
      ${j.isNew ? '<div class="new-badge">NEW</div>' : ''}
      <span class="category-tag ${j.category}">${getCategoryLabel(j.category)}</span>
      <h3>${j.title}</h3>
      <div class="company">${j.company}</div>
      <div class="description">${j.description}</div>
      <div class="meta">
        <span>${j.location}</span>
        <span>${j.type}</span>
        ${j.remote ? '<span>Remote</span>' : ''}
        <span>נמצא: ${j.dateFound}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="match-score ${j.matchScore >= 80 ? 'high' : 'medium'}">
          ${j.matchScore >= 80 ? '&#9733;' : '&#9734;'} התאמה: ${j.matchScore}%
        </span>
        <a href="${j.url}" target="_blank" class="apply-btn">צפייה והגשה &larr;</a>
      </div>
    </div>
  `).join('');
}

function getCategoryLabel(cat) {
  const labels = { ngo: 'NGO / זכויות אדם', admin: 'אדמיניסטרציה', hebrew: 'עברית', social: 'צרפתית' };
  return labels[cat] || cat;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderJobs();
  });
});

// Search
document.getElementById('searchBox').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderJobs();
});

// Last updated
document.getElementById('lastUpdated').textContent = 'עדכון אחרון: ' + LAST_UPDATED;

// Init
renderStats();
renderJobs();
</script>
