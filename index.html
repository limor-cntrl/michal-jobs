<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michal's Job Dashboard - Berlin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }

        .header h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .header .subtitle {
            color: #a0a0b0;
            font-size: 0.95rem;
        }

        .header .last-updated {
            color: #e94560;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem 2rem;
            background: #1a1a2e;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 0.5rem 1rem;
        }

        .stat-item .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e94560;
        }

        .stat-item .label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            flex-wrap: wrap;
            background: #12121f;
        }

        .filter-btn {
            padding: 0.5rem 1.2rem;
            border: 1px solid #333;
            background: transparent;
            color: #aaa;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }

        .toggle-hidden {
            padding: 0.5rem 1.2rem;
            border: 1px solid #555;
            background: #222;
            color: #999;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            font-size: 0.8rem;
            margin-right: 1rem;
        }

        .jobs-container {
            max-width: 1200px;
            margin: 1rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1rem;
        }

        .job-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 1.2rem;
            border: 1px solid #2a2a3e;
            transition: all 0.3s;
            position: relative;
        }

        .job-card:hover {
            border-color: #e94560;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.15);
        }

        .job-card.hidden-card {
            opacity: 0.4;
            display: none;
        }

        .job-card .badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge.new { background: #e94560; color: #fff; }
        .badge.ngo { background: #2196F3; color: #fff; }
        .badge.admin { background: #4CAF50; color: #fff; }
        .badge.hebrew { background: #FF9800; color: #fff; }
        .badge.social { background: #9C27B0; color: #fff; }

        .job-card .company {
            font-size: 0.8rem;
            color: #e94560;
            margin-bottom: 0.3rem;
        }

        .job-card .title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .job-card .description {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 0.8rem;
            line-height: 1.5;
        }

        .job-card .meta {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: #777;
            margin-bottom: 0.8rem;
        }

        .job-card .score {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .score.high { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .score.medium { background: rgba(255, 152, 0, 0.2); color: #FF9800; }

        .job-card .actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .apply-btn {
            flex: 1;
            padding: 0.6rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            font-size: 0.85rem;
            text-decoration: none;
            text-align: center;
            transition: background 0.3s;
        }

        .apply-btn:hover { background: #d63851; }

        .hide-btn {
            padding: 0.6rem 1rem;
            background: transparent;
            color: #666;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
            font-size: 0.85rem;
        }

        .quote-card {
            max-width: 1200px;
            margin: 1.5rem auto;
            padding: 1.2rem 2rem;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-right: 4px solid #e94560;
            border-radius: 8px;
            text-align: center;
            color: #aaa;
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .jobs-container {
                grid-template-columns: 1fr;
            }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Michal's Job Dashboard</h1>
    <div class="subtitle">Berlin | English-speaking positions | No German required</div>
    <div class="last-updated" id="lastUpdated"></div>
</div>

<div class="stats-bar" id="statsBar"></div>

    <button class="filter-btn active" onclick="filterJobs('all')">All</button>

    <button class="filter-btn" onclick="filterJobs('admin')">Admin / Office</button>
    <button class="filter-btn" onclick="filterJobs('hebrew')">Hebrew</button>
    <button class="filter-btn" onclick="filterJobs('social')">French / Social</button>
    <button class="toggle-hidden" id="toggleHidden" onclick="toggleHidden()">Show hidden</button>

<div class="quote-card">

</div>

<div class="jobs-container" id="jobsContainer"></div>

    },
    {

        location: "Remote / Berlin", type: "Full-time", remote: true,

        description: "תיאום מחקר בנושאי שחיתות ומשילות. מחקר שולחני, הכנת חומרים מקוריים. שכר מ-42,000 EUR. אפשרות עבודה מרחוק. הדדליין עבר אך ייתכן שטרם אוייש."
    },

        company: "Concentrix", category: "hebrew",

    {

    {
        id: 304, title: "Localisation Lead - Hebrew - Marketplace",

        matchScore: 78, isNew: true,
        description: "ניהול לוקליזציה לשוק העברי ב-Booking.com. עבודה עם צוותי מוצר ושיווק. דורש ידע בטכנולוגיות תרגום. חברה בינלאומית מובילה. מתאים למי שמכיר/ה את השוק הישראלי."
    },
    {
        id: 501, title: "Office Manager (m/f/d)",
        company: "Aristander.AI", category: "admin",
        url: "https://aristander.ai/jobs/office-manager-m-f-d/",

        description: "ניהול משרד בסטארטאפ Travel Tech. ניהול מסמכים, תיאום פגישות, תמיכה אדמיניסטרטיבית. היררכיה שטוחה ותקשורת פתוחה. מתאים לכניסה מהירה לשוק העבודה."
    },
    {
        id: 502, title: "Office Manager / PA to Operating Partner",
        company: "VC Firm (via Berlin Startup Jobs)", category: "admin",
        url: "https://berlinstartupjobs.com/skill-areas/office-manager/",
        location: "Berlin", type: "Full-time", remote: false,
        dateFound: "2026-04-15", datePublished: "2026-04-01", deadline: null,
        matchScore: 82, isNew: true,
        description: "ניהול משרד וסיוע אישי לשותף מנהל בקרן הון סיכון. תפקיד מגוון כולל ניהול יומן, נסיעות, HR admin ו-onboarding. סביבה בינלאומית ודינמית."
    }
];
// ===== END DATA SECTION =====

// State
let currentFilter = 'all';
let hiddenJobs = JSON.parse(localStorage.getItem('hiddenJobs') || '[]');
let showHidden = false;

function renderStats() {
    const statsBar = document.getElementById('statsBar');
    const total = JOBS.length;
    const newCount = JOBS.filter(j => j.isNew).length;
    const categories = { ngo: 0, admin: 0, hebrew: 0, social: 0 };
    JOBS.forEach(j => categories[j.category] = (categories[j.category] || 0) + 1);

    statsBar.innerHTML = `
        <div class="stat-item"><div class="number">${total}</div><div class="label">Total</div></div>
        <div class="stat-item"><div class="number">${newCount}</div><div class="label">New</div></div>
        <div class="stat-item"><div class="number">${categories.ngo}</div><div class="label">NGO</div></div>
        <div class="stat-item"><div class="number">${categories.admin}</div><div class="label">Admin</div></div>
        <div class="stat-item"><div class="number">${categories.hebrew}</div><div class="label">Hebrew</div></div>
        <div class="stat-item"><div class="number">${categories.social}</div><div class="label">French</div></div>
    `;
}

function renderJobs() {
    const container = document.getElementById('jobsContainer');
    const filtered = JOBS.filter(j => {
        if (currentFilter !== 'all' && j.category !== currentFilter) return false;
        if (!showHidden && hiddenJobs.includes(j.id)) return false;
        return true;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No jobs match the current filter.</p></div>';
        return;
    }

    container.innerHTML = filtered.map(j => {
        const isHidden = hiddenJobs.includes(j.id);
        const scoreClass = j.matchScore >= 80 ? 'high' : 'medium';
        const deadlineStr = j.deadline ? `Deadline: ${j.deadline}` : '';

        return `
            <div class="job-card ${isHidden ? 'hidden-card' : ''}" data-category="${j.category}">
                ${j.isNew ? '<span class="badge new">NEW</span>' : ''}
                <span class="badge ${j.category}" style="top: ${j.isNew ? '2.5rem' : '1rem'}">${j.category.toUpperCase()}</span>
                <div class="company">${j.company}</div>
                <div class="title">${j.title}</div>
                <div class="description">${j.description}</div>
                <div class="meta">
                    <span>${j.location}</span>
                    <span>${j.type}</span>
                    ${j.remote ? '<span>Remote</span>' : ''}
                    ${deadlineStr ? `<span style="color:#e94560">${deadlineStr}</span>` : ''}
                    <span class="score ${scoreClass}">Match: ${j.matchScore}%</span>
                </div>
                <div class="actions">
                    <a href="${j.url}" target="_blank" class="apply-btn">Apply Now</a>
                    <button class="hide-btn" onclick="toggleJobHidden(${j.id})">${isHidden ? 'Show' : 'Hide'}</button>
                </div>
            </div>
        `;
    }).join('');
}

function filterJobs(category) {
    currentFilter = category;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderJobs();
}

function toggleJobHidden(id) {
    if (hiddenJobs.includes(id)) {
        hiddenJobs = hiddenJobs.filter(x => x !== id);
    } else {
        hiddenJobs.push(id);
    }
    try { localStorage.setItem('hiddenJobs', JSON.stringify(hiddenJobs)); } catch(e) {}
    renderJobs();
}

function toggleHidden() {
    showHidden = !showHidden;
    document.getElementById('toggleHidden').textContent = showHidden ? 'Hide hidden' : 'Show hidden';
    renderJobs();
}

// Init
document.getElementById('lastUpdated').textContent = `Last updated: ${new Date(LAST_UPDATED).toLocaleString('he-IL')}`;
renderStats();
renderJobs();
</script>

</body>
</html>
