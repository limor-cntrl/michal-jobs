<meta charset="UTF-8" />

<style>
  :root {
    --bg: #0f1419;
    --card: #1a2028;
    --card-hover: #232b35;
    --text: #e8eaed;
    --muted: #9aa5b1;
    --accent: #f0b429;
    --accent-2: #8bc34a;
    --border: #2a3340;
    --ngo: #6c8ebf;
    --admin: #b57edc;
    --hebrew: #f0b429;
    --social: #e57373;
    --new: #8bc34a;

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Assistant", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
  }
  header {
    padding: 28px 24px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 1.8rem;
    color: var(--accent);
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .quote-card {
    max-width: 720px;
    margin: 22px auto 10px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #1e2732, #2b3748);
    border-radius: 10px;
    border-right: 4px solid var(--accent);
    text-align: center;
    font-style: italic;
    color: #d6dbe3;
  }
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 16px 24px;
  }
  .filters button {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
  }
  .filters button:hover { background: var(--card-hover); }
  .filters button.active {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 12px 20px 40px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
  }
  .job {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: transform 0.15s, background 0.15s;
    position: relative;
  }
  .job:hover {
    background: var(--card-hover);
    transform: translateY(-2px);
  }
  .badge {
    display: inline-block;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
    color: #111;
    font-weight: 600;
  }
  .badge.ngo { background: var(--ngo); color: #fff; }
  .badge.admin { background: var(--admin); color: #fff; }
  .badge.hebrew { background: var(--hebrew); }
  .badge.social { background: var(--social); color: #fff; }
  .badge.new { background: var(--new); }
  .job h3 {
    margin: 0 0 4px;
    font-size: 1.05rem;
    color: var(--text);
  }
  .company {
    color: var(--accent-2);
    font-weight: 500;
    margin-bottom: 8px;
    font-size: 0.92rem;
  }
  .meta {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .desc {
    font-size: 0.9rem;
    color: #c9d1da;
    margin-bottom: 12px;
  }
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .actions a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
  }
  .actions a:hover { text-decoration: underline; }
  .score {
    background: var(--border);
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 0.8rem;
    color: var(--text);
  }
  .hidden-toggle {
    display: block;
    margin: 18px auto 0;
    padding: 6px 14px;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    border: 1px dashed var(--border);
    cursor: pointer;
    font-size: 0.85rem;
  }
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }
  footer {
    text-align: center;
    color: var(--muted);
    padding: 24px;
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }
</style>

// ---------- render ----------
const grid = document.getElementById('grid');
const buttons = document.querySelectorAll('#filters button');
let currentCat = 'all';
let showHidden = false;
const hiddenIds = new Set(JSON.parse(sessionStorage?.getItem?.('hid')||'[]'));

function render() {
  const filtered = JOBS.filter(j => (currentCat==='all' || j.category===currentCat))
                      .filter(j => showHidden || !hiddenIds.has(j.id))
                      .sort((a,b) => b.matchScore - a.matchScore);
  grid.innerHTML = '';
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">אין משרות בקטגוריה הזו כרגע</div>';
    return;
  }
  for (const j of filtered) {
    const card = document.createElement('div');
    card.className = 'job';
    card.innerHTML = `
      <div style="margin-bottom:6px">
        <span class="badge ${j.category}">${catLabel(j.category)}</span>
        ${j.isNew ? '<span class="badge new">חדש</span>' : ''}
      </div>
      <h3>${j.title}</h3>
      <div class="company">${j.company}</div>
      <div class="meta">${j.location} · ${j.type}${j.remote?' · Remote':''} · נמצא ${j.dateFound}</div>
      <div class="desc">${j.description}</div>
      <div class="actions">
        <a href="${j.url}" target="_blank" rel="noopener">הגש עכשיו →</a>
        <span class="score">${j.matchScore}%</span>
      </div>
    `;
    grid.appendChild(card);
  }
}
function catLabel(c) {
  return {ngo:'NGO', admin:'אדמין/EA', hebrew:'עברית', social:'צרפתית/Social'}[c] || c;
}
function toggleHidden() {
  showHidden = !showHidden;
  render();
}
buttons.forEach(b => b.addEventListener('click', () => {
  buttons.forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  currentCat = b.dataset.cat;
  render();
}));
document.getElementById('lastUpdated').textContent = LAST_UPDATED;
render();
