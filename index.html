    --danger-light: #fef2f2;

  .urgent-text { font-size: 14px; font-weight: 600; color: var(--danger); }
  .urgent-sub { font-size: 13px; color: var(--text-secondary); font-weight: 400; }

  /* Tabs */
  .tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); overflow-x: auto; }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

    .filters { flex-direction: column; align-items: stretch; }
    .search-input { width: 100%; }
    .tab { padding: 8px 12px; font-size: 13px; }
  }
</style>

function getDailyQuote() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / 86400000);
  return QUOTES[dayOfYear % QUOTES.length];
}

// Export all tracking data as a downloadable JSON file
function exportData(cvTracking, notes, hiddenJobs) {
  const data = {
    version: 2,
    exportDate: new Date().toISOString(),
    cvTracking: cvTracking,
    notes: notes || {},
    hiddenJobs: arguments[2] || {},
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "michal_job_tracking_" + TODAY + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Import tracking data from a JSON file
function importData(callback) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.cvTracking) {
          callback(data.cvTracking, data.notes || {}, data.hiddenJobs || {});
        }
      } catch(err) {
        alert("קובץ לא תקין");
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date();
  now.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return d.toLocaleDateString("he-IL", { day: "numeric", month: "short" });
}

function isUrgent(job) {
  if (!job.deadline) return false;
  const days = daysUntil(job.deadline);
  return days !== null && days >= 0 && days <= 7;
}

    return JOBS.filter(j => !hiddenJobs[j.id] && !cvTracking[j.id]).length;
  }, [hiddenJobs, cvTracking]);

  const lastUpdated = new Date(LAST_UPDATED);
  const formattedDate = lastUpdated.toLocaleDateString("he-IL", { year: "numeric", month: "long", day: "numeric" });

  const dailyQuote = useMemo(() => getDailyQuote(), []);

  return (
    <div>
      <div className="header">
        <div className="container">
          <h1>חיפוש עבודה — מיכל זיו, ברלין</h1>
          <p>עודכן: {formattedDate} | רק משרות רלוונטיות ומאומתות | אנגלית, עברית, צרפתית — ללא גרמנית</p>
        </div>
      </div>
      <div className="container">

        {/* Daily inspiration */}
        <div className="quote-card">
          <span className="quote-emoji">{dailyQuote.emoji}</span>
          <div className="quote-text">״{dailyQuote.text}״</div>
          <div className="quote-source">— {dailyQuote.source}</div>
        </div>

        {/* Weekly mission tracker */}
        <div className="mission-banner">
          <div className="mission-header">
            <div>
              <div className="mission-title">
                {notAppliedCount > 0
                  ? `המשימה שלך: הגישי קו"ח ל-${Math.min(3, notAppliedCount)} משרות היום`
                  : "כל הכבוד! הגשת לכל המשרות"
                }
              </div>
              <div className="mission-sub">
                {weeklyApps === 0
                  ? "עוד לא הגשת השבוע — בואי נתחיל!"
                  : `הגשת ${weeklyApps} מתוך ${WEEKLY_GOAL} השבוע`
                }
                {applyTodayJobs.length > 0 && ` · ${applyTodayJobs.length} עם דדליין ב-3 ימים הקרובים!`}
              </div>
            </div>
            <div className="mission-count">{weeklyApps}/{WEEKLY_GOAL}</div>
          </div>
          <div className="progress-bar-bg">
            <div className="progress-bar-fill" style={{width: `${Math.min(100, (weeklyApps / WEEKLY_GOAL) * 100)}%`}}></div>
          </div>
          <div style={{marginTop:12,fontSize:13,color:"#166534",borderTop:"1px solid #bbf7d0",paddingTop:10}}>
            <strong>צעד קריטי:</strong> הגדירי <strong>Job Alerts</strong> באתרים הבאים — זה מביא ישר למייל משרות שהדשבורד לא תופס:
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
              <a href="https://www.linkedin.com/jobs/search/?keywords=English+coordinator+Berlin&f_TPR=r604800" target="_blank" rel="noopener noreferrer" style={{padding:"4px 10px",background:"#16a34a",color:"white",borderRadius:6,textDecoration:"none",fontSize:12,fontWeight:600}}>LinkedIn Alert</a>
              <a href="https://englishjobs.de/in/berlin/assistant" target="_blank" rel="noopener noreferrer" style={{padding:"4px 10px",background:"#16a34a",color:"white",borderRadius:6,textDecoration:"none",fontSize:12,fontWeight:600}}>EnglishJobs.de</a>
              <a href="https://www.impactpool.org/countries/Germany" target="_blank" rel="noopener noreferrer" style={{padding:"4px 10px",background:"#16a34a",color:"white",borderRadius:6,textDecoration:"none",fontSize:12,fontWeight:600}}>ImpactPool</a>
              <a href="https://www.glassdoor.com/Job/berlin-english-speaking-jobs-SRCH_IL.0,6_IC2622109_KO7,23.htm" target="_blank" rel="noopener noreferrer" style={{padding:"4px 10px",background:"#16a34a",color:"white",borderRadius:6,textDecoration:"none",fontSize:12,fontWeight:600}}>Glassdoor</a>
              <a href="https://www.europelanguagejobs.com/jobs-in-Berlin-for-Hebrew-speakers" target="_blank" rel="noopener noreferrer" style={{padding:"4px 10px",background:"#16a34a",color:"white",borderRadius:6,textDecoration:"none",fontSize:12,fontWeight:600}}>Hebrew Jobs</a>
            </div>
          </div>
        </div>

        {/* Urgent banner */}
        {urgentJobs.length > 0 && activeTab === "jobs" && activeFilter !== "urgent" && (
          <div className="urgent-banner" onClick={() => setActiveFilter("urgent")}>
            <span className="urgent-icon">&#9200;</span>
            <div>
              <div className="urgent-text">
                {urgentJobs.length === 1 ? "יש משרה אחת" : `יש ${urgentJobs.length} משרות`} עם דד-ליין קרוב!
              </div>
              <div className="urgent-sub">לחצי כאן לראות את המשרות שצריך להגיש אליהן בשבוע הקרוב</div>
            </div>
          </div>
        )}

        {/* Stats */}
        <div className="stats-row">
          <div className="stat-card"><div className="number">{stats.total}</div><div className="label">משרות אמיתיות</div></div>
          <div className="stat-card"><div className="number" style={{color:"var(--success)"}}>{stats.sent}</div><div className="label">שלחתי קו"ח</div></div>
          {stats.urgent > 0 && <div className="stat-card"><div className="number" style={{color:"var(--danger)"}}>{stats.urgent}</div><div className="label">דד-ליין קרוב</div></div>}
          <div className="stat-card"><div className="number" style={{color:"var(--cat1)"}}>{stats.ngo}</div><div className="label">NGO / זכויות אדם</div></div>
          {stats.hebrew > 0 && <div className="stat-card"><div className="number" style={{color:"#2e7d32"}}>{stats.hebrew}</div><div className="label">עברית — יתרון!</div></div>}
          {stats.admin > 0 && <div className="stat-card"><div className="number" style={{color:"var(--cat5)"}}>{stats.admin}</div><div className="label">אדמיניסטרציה</div></div>}
          <div className="stat-card"><div className="number" style={{color:"var(--cat4)"}}>{stats.social}</div><div className="label">Social Impact</div></div>
          <div className="stat-card"><div className="number" style={{color:"var(--success)"}}>{stats.remote}</div><div className="label">Remote / גמיש</div></div>
        </div>

        {/* Data management bar */}
        <div className="data-bar">
          <span className="data-bar-label">הסימונים שלי (שלחתי קו"ח, הערות)</span>
          <div className="data-bar-actions">
            <button className="data-btn" onClick={handleImport}>
              <span className="data-btn-icon">&#128229;</span> טעינת סימונים
            </button>
            <button className="data-btn primary" onClick={handleExport}>
              <span className="data-btn-icon">&#128190;</span> שמירת סימונים
            </button>
          </div>
        </div>
        {importMsg && <div className="import-success">{importMsg}</div>}

        {/* Tabs */}
        <div className="tab-bar">
          <button className={`tab ${activeTab==="jobs"?"active":""}`} onClick={()=>setActiveTab("jobs")}>משרות ({JOBS.length})</button>
          <button className={`tab ${activeTab==="platforms"?"active":""}`} onClick={()=>setActiveTab("platforms")}>איפה לחפש</button>
          <button className={`tab ${activeTab==="tips"?"active":""}`} onClick={()=>setActiveTab("tips")}>טיפים</button>
        </div>

        {activeTab === "jobs" && (
          <div>
            <div className="filters">
              <span style={{fontSize:12,fontWeight:600,color:"var(--text-secondary)"}}>סינון:</span>
              {[["all","הכל"],["urgent","דד-ליין קרוב"],["sent","שלחתי קו\"ח"],["notsent","טרם נשלח"],["ngo","NGO / זכויות אדם"],["hebrew","עברית — יתרון!"],["admin","אדמיניסטרציה"],["social","Social Impact"],["education","חינוך"]].map(([k,l])=>(
                <button key={k} className={`filter-btn ${k==="urgent"?"urgent-filter":""} ${activeFilter===k?"active":""}`} onClick={()=>setActiveFilter(k)}>{l}</button>
              ))}
              {hiddenCount > 0 && (
                <button className={`filter-btn ${activeFilter==="hidden"?"active":""}`} style={{opacity:0.7,fontSize:12}} onClick={()=>setActiveFilter(activeFilter==="hidden"?"all":"hidden")}>הוסתרו ({hiddenCount})</button>
              )}
              <input className="search-input" placeholder="חיפוש חופשי..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
            </div>
            <div className="job-list">
              {filteredJobs.length === 0 ? (
                <div className="empty-state"><p style={{fontSize:16}}>לא נמצאו משרות מתאימות</p><p>נסי לשנות את הסינון או מילות החיפוש</p></div>
              ) : filteredJobs.map((job, idx) => {
                const urgent = isUrgent(job);
                const deadlineDays = job.deadline ? daysUntil(job.deadline) : null;
                // Priority headers
                const prevJob = idx > 0 ? filteredJobs[idx-1] : null;
                const isApplyToday = job.deadline && daysUntil(job.deadline) >= 0 && daysUntil(job.deadline) <= 3;
                const isApplyWeek = job.deadline && daysUntil(job.deadline) > 3 && daysUntil(job.deadline) <= 14;
                const prevIsToday = prevJob && prevJob.deadline && daysUntil(prevJob.deadline) >= 0 && daysUntil(prevJob.deadline) <= 3;
                const prevIsWeek = prevJob && prevJob.deadline && daysUntil(prevJob.deadline) > 3 && daysUntil(prevJob.deadline) <= 14;
                const showTodayHeader = activeFilter === "all" && isApplyToday && (idx === 0 || !prevIsToday);
                const showWeekHeader = activeFilter === "all" && isApplyWeek && !isApplyToday && (idx === 0 || prevIsToday || !prevIsWeek);
                const showExploreHeader = activeFilter === "all" && !isApplyToday && !isApplyWeek && (idx === 0 || prevIsToday || prevIsWeek);
                return (<React.Fragment key={job.id}>
                {showTodayHeader && <div className="priority-label priority-apply-today"><span className="emoji">🔴</span> הגישי היום — דדליין ב-3 ימים!</div>}
                {showWeekHeader && <div className="priority-label priority-apply-week"><span className="emoji">🟡</span> הגישי השבוע — דדליין ב-2 שבועות</div>}
                {showExploreHeader && <div className="priority-label priority-explore"><span className="emoji">🔵</span> לבדוק ולהגיש — ללא דדליין קרוב</div>}
                  <div className={`job-card ${urgent ? "urgent-card" : ""} ${hiddenJobs[job.id] ? "hidden-card" : ""}`}>
                    <div className="job-card-top">
                      <div style={{flex:1}}>
                        <div className="job-title">
                          {job.title}
                        </div>
                        <div className="job-company">{job.company}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                        <div className="job-badges">
                          {urgent && <span className="badge badge-urgent">דד-ליין קרוב</span>}
                          {job.isNew && <span className="badge badge-new">חדש</span>}
                          {job.remote && <span className="badge badge-remote">Remote</span>}
                        </div>
                        <span className={`category-tag ${CATEGORY_CLASSES[job.category]}`}>{CATEGORY_LABELS[job.category]}</span>
                        <span className={`match-pill ${job.matchScore>=80?"match-high":"match-med"}`}>{job.matchScore>=80?"★":"☆"} התאמה {job.matchScore}%</span>
                      </div>
                    </div>

                    <p className="job-desc">{job.description}</p>

                    <div className="job-details">
                      <span className="detail"><span className="detail-icon">&#128205;</span> {job.location}</span>
                      <span className="detail"><span className="detail-icon">&#128337;</span> {job.type}</span>
                      {job.datePublished && (
                        <span className="detail"><span className="detail-icon">&#128197;</span> פורסם: {formatDate(job.datePublished)}</span>
                      )}
                      {job.deadline && deadlineDays !== null && (
                        <span className={`detail ${deadlineDays <= 7 ? "deadline-warn" : "deadline-ok"}`}>
                          <span className="detail-icon">&#9200;</span>
                          {deadlineDays < 0
                            ? "הדד-ליין עבר"
                            : deadlineDays === 0
                              ? "דד-ליין היום!"
                              : deadlineDays === 1
                                ? "דד-ליין מחר!"
                                : `דד-ליין: ${formatDate(job.deadline)} (עוד ${deadlineDays} ימים)`
                          }
                        </span>
                      )}
                    </div>

                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10,flexWrap:"wrap"}}>
                      <a href={job.url} target="_blank" rel="noopener noreferrer" className="apply-btn" style={{marginTop:0, background: urgent ? "var(--danger)" : cvTracking[job.id] ? "var(--success)" : "var(--accent)"}}>
                        {cvTracking[job.id] ? "נשלח ✓" : urgent ? "להגיש עכשיו!" : "לפתוח ולהגיש קו״ח"}
                      </a>
                      {!hiddenJobs[job.id] && (
                        <div className={`cv-tracker ${cvTracking[job.id] ? "sent" : ""}`}>
                          <div
                            className={`cv-check ${cvTracking[job.id] ? "checked" : ""}`}
                            onClick={() => toggleCvSent(job.id)}
                            role="checkbox"
                            aria-checked={!!cvTracking[job.id]}
                            tabIndex={0}
                            onKeyDown={e => { if(e.key==="Enter"||e.key===" ") toggleCvSent(job.id); }}
                          >
                            {cvTracking[job.id] ? "✓" : ""}
                          </div>
                          {cvTracking[job.id] ? (
                            <span>
                              <span className="cv-label sent-label">שלחתי קו"ח</span>
                              <span className="cv-date"> — {cvTracking[job.id]}</span>
                            </span>
                          ) : (
                            <span className="cv-label">סמני כשנשלח קו"ח</span>
                          )}
                        </div>
                      )}
                      <button
                        onClick={() => toggleHidden(job.id)}
                        style={{
                          background: hiddenJobs[job.id] ? "var(--accent-light)" : "none",
                          border: "1px solid var(--border)",
                          borderRadius: 6,
                          padding: "5px 12px",
                          cursor: "pointer",
                          fontSize: 13,
                          fontFamily: "'Assistant', sans-serif",
                          color: hiddenJobs[job.id] ? "var(--accent)" : "var(--text-secondary)",
                          transition: "all 0.15s",
                          display: "flex",
                          alignItems: "center",
                          gap: 4,
                        }}
                        title={hiddenJobs[job.id] ? "להחזיר לרשימה" : "להסתיר משרה זו"}
                      >
                        {hiddenJobs[job.id] ? "↩ החזרה" : "✕ לא רלוונטי"}
                      </button>
                    </div>
                  </div>
                </React.Fragment>);
              })}
            </div>
          </div>
        )}

        {activeTab === "platforms" && (
          <div>
            <div style={{background:"#fff3cd",border:"1px solid #ffc107",borderRadius:8,padding:"14px 18px",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:15,color:"#856404",marginBottom:4}}>הכי חשוב: להגדיר התראות מייל!</div>
              <div style={{fontSize:14,color:"#856404"}}>כל אתר כאן מאפשר להגדיר Job Alert — מייל אוטומטי כשיש משרה חדשה. זה הכלי הכי חזק למציאת עבודה מהירה. היכנסי לכל אתר והגדירי התראות עם מילות חיפוש כמו: English, coordinator, assistant, Hebrew, French.</div>
            </div>
            <div className="section-label">דפי קריירה של ארגונים — לבדוק ישירות</div>
            <div className="platforms-grid">
              {CAREER_PAGES.map((p,i)=>(
                <div className="platform-card" key={i}><div><div className="name">{p.name}</div><div className="desc">{p.desc}</div></div><a href={p.url} target="_blank" rel="noopener noreferrer" className="platform-link">לדף הקריירה</a></div>
              ))}
            </div>
            <div className="section-label">עברית + צרפתית — יתרון ייחודי!</div>
            <div className="platforms-grid">
              {PLATFORMS.filter(p=>p.group==="hebrew").map((p,i)=>(
                <div className="platform-card" key={i}><div><div className="name">{p.name}</div><div className="desc">{p.desc}</div></div><a href={p.url} target="_blank" rel="noopener noreferrer" className="platform-link">פתח</a></div>
              ))}
            </div>
            <div className="section-label">לוחות משרות — NGO, Social Impact, זכויות אדם</div>
            <div className="platforms-grid">
              {PLATFORMS.filter(p=>p.group==="social").map((p,i)=>(
                <div className="platform-card" key={i}><div><div className="name">{p.name}</div><div className="desc">{p.desc}</div></div><a href={p.url} target="_blank" rel="noopener noreferrer" className="platform-link">פתח</a></div>
              ))}
            </div>
            <div className="section-label">לוחות משרות כלליים באנגלית — אדמיניסטרציה, משרד, קואורדינציה</div>
            <div className="platforms-grid">
              {PLATFORMS.filter(p=>p.group==="general").map((p,i)=>(
                <div className="platform-card" key={i}><div><div className="name">{p.name}</div><div className="desc">{p.desc}</div></div><a href={p.url} target="_blank" rel="noopener noreferrer" className="platform-link">פתח</a></div>
              ))}
            </div>
          </div>
        )}

        {activeTab === "tips" && (
          <div>
            <div className="tip-block">
              <h4>תלוש משכורת גרמני (Gehaltsabrechnung)</h4>
              <p>כל חברה רשומה בגרמניה נותנת תלוש גרמני — כולל NGO, בתי ספר וחברות בינלאומיות. גם חברות Employer of Record (כמו Remote.com או Deel) מאפשרות עבודה עבור חברה זרה עם תלוש גרמני. עבודת פרילנס (Freiberufler) לא נותנת תלוש.</p>
            </div>
            <div className="tip-block">
              <h4>שעות 9-15 / Teilzeit</h4>
              <p>בגרמניה Teilzeit (משרה חלקית) היא נפוצה ומקובלת מאוד. כדאי לחפש: part-time, flexible hours, remote-first, async work. הרבה ארגונים מציעים 80% משרה.</p>
            </div>
            <div className="tip-block">
              <h4>עבודה בלי גרמנית</h4>
              <p>ברלין ידידותית לאנגלית — במיוחד בארגונים בינלאומיים, NGOs, בתי ספר בינלאומיים וסטארטאפים. כדאי להתחיל ללמוד גרמנית בסיסית (A1) ב-Volkshochschule (VHS) — זה זול ומראה מחויבות.</p>
            </div>
            <div className="tip-block">
              <h4>היתרונות של מיכל</h4>
              <p>עברית שפת אם (נדיר בברלין — יתרון בקהילה היהודית, ארגונים ישראליים), צרפתית (פותח דלתות בארגונים בינלאומיים), 10+ שנות ניהול צוותים ותוכניות, ניסיון עם פליטים ומבקשי מקלט, בניית מחלקה מאפס.</p>
            </div>
            <div className="tip-block">
              <h4>נטוורקינג</h4>
              <p>קבוצות פייסבוק: "Jobs in Berlin", "Israelis in Berlin", "Berlin Expats". LinkedIn: להתחבר לאנשי HR בארגונים רלוונטיים. tbd.community: קהילה של אנשי Social Impact בברלין עם אירועים ונטוורקינג.</p>
            </div>
            <div className="tip-block">
              <h4>מילות חיפוש מומלצות</h4>
              <p>Program Manager, Project Coordinator, Legal Advisor, Advocacy Coordinator, Grants Manager, Policy Officer, Community Manager, Volunteer Coordinator, HR Manager, Office Manager, Language Instructor</p>
            </div>
          </div>
        )}

        <div className="footer">
          <p>הדשבורד מתעדכן אוטומטית כל יום בשעה 10:00 בבוקר</p>
          <p>רק משרות פתוחות ורלוונטיות עם קישור ישיר להגשה | אנגלית, עברית, צרפתית — ללא גרמנית</p>
          <p style={{marginTop:8,fontSize:11,opacity:0.7}}>לפני פתיחת גרסה חדשה של הדשבורד — לחצי "שמירת סימונים" ואחרי פתיחת הגרסה החדשה — "טעינת סימונים"</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
