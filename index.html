// ===== APP =====
const CATEGORY_LABELS = {
  ngo: "NGO / זכויות אדם",
  admin: "אדמיניסטרציה / ניהול",
  hebrew: "עברית",
  social: "צרפתית / שפות"
};

const CATEGORY_BADGE = {
  ngo: "badge-ngo",
  admin: "badge-admin",
  hebrew: "badge-hebrew",
  social: "badge-social"
};

let activeFilter = "all";
let showHidden = false;
let hiddenJobs = JSON.parse(localStorage.getItem("hiddenJobs") || "[]");

function toggleHidden() {
  showHidden = !showHidden;
  render();
}

function hideJob(id) {
  if (!hiddenJobs.includes(id)) {
    hiddenJobs.push(id);
    localStorage.setItem("hiddenJobs", JSON.stringify(hiddenJobs));
  }
  render();
}

function render() {
  // Last updated
  document.getElementById("lastUpdated").textContent = "עדכון אחרון: " + LAST_UPDATED;

  // Stats
  const visible = JOBS.filter(j => !hiddenJobs.includes(j.id));
  const counts = {};
  visible.forEach(j => { counts[j.category] = (counts[j.category] || 0) + 1; });

  let statsHtml = `<div class="stat-card"><div class="number">${visible.length}</div><div class="label">סה"כ משרות</div></div>`;
  for (const [cat, label] of Object.entries(CATEGORY_LABELS)) {
    statsHtml += `<div class="stat-card"><div class="number">${counts[cat] || 0}</div><div class="label">${label}</div></div>`;
  }
  document.getElementById("statsBar").innerHTML = statsHtml;

  // Filters
  let filtersHtml = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" onclick="activeFilter='all';render()">הכל</button>`;
  for (const [cat, label] of Object.entries(CATEGORY_LABELS)) {
    filtersHtml += `<button class="filter-btn ${activeFilter === cat ? 'active' : ''}" onclick="activeFilter='${cat}';render()">${label}</button>`;
  }
  filtersHtml += `<button class="toggle-hidden-btn ${showHidden ? 'active' : ''}" onclick="toggleHidden()">הצג מוסתרות (${hiddenJobs.length})</button>`;
  document.getElementById("filtersBar").innerHTML = filtersHtml;

  // Jobs
  let filtered = JOBS.filter(j => activeFilter === "all" || j.category === activeFilter);
  filtered.sort((a, b) => b.matchScore - a.matchScore);

  let html = "";
  filtered.forEach(j => {
    const isHidden = hiddenJobs.includes(j.id);
    if (isHidden && !showHidden) return;

    const scoreClass = j.matchScore >= 85 ? "score-high" : "score-medium";
    const badgeClass = CATEGORY_BADGE[j.category] || "badge-admin";

    html += `
      <div class="quote-card ${isHidden ? 'hidden-job show-hidden' : ''}">
        <div class="match-score ${scoreClass}">${j.matchScore}</div>
        <span class="category-badge ${badgeClass}">${CATEGORY_LABELS[j.category]}</span>
        ${j.isNew ? '<span class="new-badge">חדש</span>' : ''}
        <div class="job-title">${j.title}</div>
        <div class="company">${j.company}</div>
        <div class="description">${j.description}</div>
        <div class="meta">
          <span>${j.location}</span>
          <span>${j.type}</span>
          ${j.remote ? '<span>Remote</span>' : ''}
          <span>נמצא: ${j.dateFound}</span>
        </div>
        <div class="actions">
          <a href="${j.url}" target="_blank" class="btn-apply">הגש מועמדות</a>
          <button class="btn-hide" onclick="hideJob(${j.id})">הסתר</button>
        </div>
      </div>
    `;
  });

  if (!html) {
    html = '<div class="empty-state">אין משרות להצגה בקטגוריה זו</div>';
  }

  document.getElementById("jobsGrid").innerHTML = html;
}

render();
</script>
