<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f4f8;
    direction: rtl;
    color: #2d3748;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const LAST_UPDATED = "2026-04-07";

const INSPIRATIONAL_QUOTES = [
  { text: "הצלחה היא לא סופית, כישלון אינו קטלני: הדבר החשוב הוא האומץ להמשיך.", author: "וינסטון צ'רצ'יל" },
  { text: "אל תחכי להזדמנות המושלמת. תפסי את ההזדמנות והפכי אותה למושלמת.", author: "ג'ין רוצ'" },
  { text: "כל המסעות הגדולים מתחילים בצעד קטן אחד.", author: "לאו דזה" },
  { text: "האנשים שמשגשגים לא מחכים לדברים שיקרו – הם גורמים לדברים לקרות.", author: "אנונימי" },
  { text: "הצלחה היא מה שקורה כשהכנה פוגשת הזדמנות.", author: "סנקה" },
  { text: "חשבי על הסיבה שאתם עושה את זה. כשהסיבה גדולה מספיק, הדרך תמצא את עצמה.", author: "אנונימי" },
  { text: "כל ניסיון שאני לא עברת הוא פגישה שלא קיימה, וכל ניסיון שעברת הוא צעד קדימה.", author: "אנונימי" }
];

const JOBS = [
  {
    id: 1,
    title: "Research Advisor (m/f/d)",
    company: "Transparency International",
    category: "ngo",
    url: "https://www.impactpool.org/jobs/1182663",
    location: "ברלין",
    type: "משרה מלאה",
    remote: false,
    dateFound: "2026-04-07",
    datePublished: "2025-11-15",
    deadline: null,
    matchScore: 82,
    isNew: true,
    description: "יועץ/ת מחקר ב-Transparency International בברלין. פיתוח חומרי מחקר ואימון בתחום מניעת שחיתות לאנשי פיתוח ו-NGOs. שפת עבודה: אנגלית בלבד (ספרדית/צרפתית/ערבית – יתרון). משרה מלאה לתקופה של 30 חודשים. שכר: 55,650€ לשנה. שימי לב: תאריך תחילת העבודה היה ינואר 2026 – ייתכן שהמשרה כבר אוישה."
  },
  {
    id: 2,
    title: "Expert Communications and Engagement – Anticipatory Action (50%)",
    company: "Welthungerhilfe",
    category: "ngo",
    url: "https://www.idealist.org/en/nonprofit-job/0e5c8bdea88740608ca7be8fcaccec81-expert-communications-and-engagement-anticipatory-action-welthungerhilfe-bonn",
    location: "ברלין / בון",
    type: "50%",
    remote: false,
    dateFound: "2026-04-07",
    datePublished: "2026-03-20",
    deadline: "2026-04-13",
    matchScore: 76,
    isNew: true,
    description: "מומחה/ית תקשורת ומעורבות ב-Welthungerhilfe (50% משרה). פיתוח אסטרטגיות תקשורת לפעולה הומניטרית מניעתית (WAHAFA) ברמה גלובלית. אנגלית חובה, צרפתית – יתרון. ברלין או בון. חוזה עד אפריל 2029 עם אפשרות להארכה. דד-ליין: 13.4.2026 – עדיין פתוח!"
  },
  {
    id: 3,
    title: "Project Officer (all genders)",
    company: "Berghof Foundation",
    category: "ngo",
    url: "https://berghof-foundation-operations-ggmbh.jobs.personio.de/job/2555959",
    location: "ברלין",
    type: "משרה מלאה",
    remote: false,
    dateFound: "2026-04-07",
    datePublished: "2026-03-01",
    deadline: "2026-03-25",
    matchScore: 74,
    isNew: true,
    description: "קצין/ת פרויקט ב-Berghof Foundation בברלין. עבודה בתחום בנייה ושמירה על שלום, פתרון קונפליקטים ומדיניות בינלאומית. אנגלית C1 חובה. משרה מלאה (39 ש'/שבוע), חוזה מוגבל עד מרץ 2027. שים לב: הדד-ליין כנראה פג (25.3.2026) – בדקי אם עדיין פתוח."
  },
  {
    id: 4,
    title: "Project Manager – RPS Department (all genders)",
    company: "Berghof Foundation",
    category: "ngo",
    url: "https://berghof-foundation-operations-ggmbh.jobs.personio.de/job/2552326",
    location: "ברלין",
    type: "משרה מלאה",
    remote: false,
    dateFound: "2026-04-07",
    datePublished: "2026-03-01",
    deadline: "2026-03-30",
    matchScore: 76,
    isNew: true,
    description: "מנהל/ת פרויקט במחלקת שלום אזורי (RPS) ב-Berghof Foundation בברלין. מיקוד בתהליכי שלום ופיוס בינלאומי. אנגלית C1 חובה. משרה מלאה (39 ש'), חוזה לשנה. שים לב: הדד-ליין כנראה פג (30.3.2026) – בדקי אם עדיין פתוח."
  },
  {
    id: 5,
    title: "Communications and Media Specialist",
    company: "Transparency International",
    category: "ngo",
    url: "https://www.transparency.org/en/career-tender-opportunities",
    location: "ברלין (היברידי)",
    type: "משרה מלאה",
    remote: true,
    dateFound: "2026-04-07",
    datePublished: "2026-02-20",
    deadline: "2026-03-16",
    matchScore: 71,
    isNew: true,
    description: "מומחה/ית תקשורת ומדיה ב-Transparency International. ניהול אסטרטגיית תקשורת, יחסי ציבור וקמפיינים. שפת עבודה: אנגלית. 4 ימים לפחות בחודש במשרד ברלין. שים לב: הדד-ליין פג (16.3.2026)."
  }
];

const CATEGORY_LABELS = {
  ngo: { label: "NGO / מדיניות", color: "#6366f1", bg: "#eef2ff" },
  social: { label: "חברתי / תקשורת", color: "#0891b2", bg: "#ecfeff" },
  education: { label: "חינוך / מחקר", color: "#059669", bg: "#ecfdf5" }
};

function MatchBar({ score }) {
  const color = score >= 85 ? "#16a34a" : score >= 75 ? "#ca8a04" : "#3b82f6";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
      <div style={{ flex: 1, height: 8, background: "#e5e7eb", borderRadius: 4, overflow: "hidden" }}>
        <div style={{ width: `${score}%`, height: "100%", background: color, borderRadius: 4, transition: "width 0.4s" }} />
      </div>
      <span style={{ fontSize: 13, fontWeight: 700, color, minWidth: 32 }}>{score}%</span>
    </div>
  );
}

function JobCard({ job, onHide }) {
  const [expanded, setExpanded] = useState(false);
  const cat = CATEGORY_LABELS[job.category] || CATEGORY_LABELS.ngo;
  const isExpired = job.deadline && new Date(job.deadline) < new Date("2026-04-07");

  return (
    <div style={{
      background: "white",
      borderRadius: 14,
      border: `2px solid ${isExpired ? "#e5e7eb" : job.isNew ? "#6366f1" : "#e5e7eb"}`,
      padding: "18px 20px",
      marginBottom: 16,
      boxShadow: isExpired ? "none" : "0 2px 12px rgba(99,102,241,0.08)",
      opacity: isExpired ? 0.7 : 1,
      position: "relative"
    }}>
      {job.isNew && !isExpired && (
        <span style={{
          position: "absolute", top: 14, left: 14,
          background: "#6366f1", color: "white",
          fontSize: 11, fontWeight: 700,
          padding: "2px 8px", borderRadius: 20
        }}>חדש ✨</span>
      )}
      {isExpired && (
        <span style={{
          position: "absolute", top: 14, left: 14,
          background: "#e5e7eb", color: "#6b7280",
          fontSize: 11, fontWeight: 700,
          padding: "2px 8px", borderRadius: 20
        }}>פג תוקף</span>
      )}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
            <span style={{
              background: cat.bg, color: cat.color,
              fontSize: 11, fontWeight: 700,
              padding: "2px 8px", borderRadius: 20
            }}>{cat.label}</span>
            <span style={{
              background: "#f3f4f6", color: "#374151",
              fontSize: 11, padding: "2px 8px", borderRadius: 20
            }}>{job.type}</span>
            {job.remote && (
              <span style={{
                background: "#ecfdf5", color: "#059669",
                fontSize: 11, padding: "2px 8px", borderRadius: 20
              }}>היברידי</span>
            )}
          </div>
          <h3 style={{ fontSize: 17, fontWeight: 700, color: "#1e293b", marginBottom: 2 }}>{job.title}</h3>
          <p style={{ fontSize: 14, color: "#6366f1", fontWeight: 600 }}>{job.company}</p>
          <p style={{ fontSize: 13, color: "#64748b", marginTop: 2 }}>📍 {job.location}</p>
        </div>
        <div style={{ textAlign: "left", minWidth: 90 }}>
          <div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 4 }}>התאמה</div>
          <MatchBar score={job.matchScore} />
        </div>
      </div>

      {job.deadline && (
        <div style={{
          marginTop: 10,
          padding: "6px 12px",
          background: isExpired ? "#f9fafb" : "#fef9c3",
          borderRadius: 8,
          fontSize: 13,
          color: isExpired ? "#9ca3af" : "#854d0e",
          fontWeight: 600
        }}>
          {isExpired ? "🔴 דד-ליין פג: " : "⏰ דד-ליין: "}{job.deadline}
        </div>
      )}

      <div style={{
        marginTop: 10,
        fontSize: 13,
        color: "#64748b",
        lineHeight: 1.6,
        display: expanded ? "block" : "-webkit-box",
        WebkitLineClamp: 2,
        WebkitBoxOrient: "vertical",
        overflow: expanded ? "visible" : "hidden",
        cursor: "pointer"
      }}
        onClick={() => setExpanded(!expanded)}
      >
        {job.description}
      </div>
      {!expanded && (
        <button onClick={() => setExpanded(true)} style={{
          background: "none", border: "none", color: "#6366f1",
          fontSize: 13, cursor: "pointer", padding: "4px 0", fontWeight: 600
        }}>קראי עוד ▾</button>
      )}

      <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
        <a href={job.url} target="_blank" rel="noopener noreferrer" style={{
          background: isExpired ? "#f3f4f6" : "#6366f1",
          color: isExpired ? "#6b7280" : "white",
          padding: "8px 18px", borderRadius: 8,
          fontSize: 14, fontWeight: 700, textDecoration: "none",
          display: "inline-block"
        }}>
          {isExpired ? "📋 צפי בפרטים" : "📨 הגישי מועמדות"}
        </a>
        <button onClick={() => onHide(job.id)} style={{
          background: "#f8fafc", border: "1px solid #e2e8f0",
          color: "#64748b", padding: "8px 14px",
          borderRadius: 8, fontSize: 13, cursor: "pointer"
        }}>הסתרי ✕</button>
      </div>
      <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 10, textAlign: "left" }}>
        נמצא: {job.dateFound}
        {job.datePublished && ` | פורסם: ${job.datePublished}`}
      </div>
    </div>
  );
}

function App() {
  const [hiddenIds, setHiddenIds] = useState(() => {
    try {
      return JSON.parse(window._hiddenJobs || "[]");
    } catch { return []; }
  });
  const [filter, setFilter] = useState("all");
  const [showHidden, setShowHidden] = useState(false);
  const [quoteIdx] = useState(() => Math.floor(Math.random() * INSPIRATIONAL_QUOTES.length));

  const quote = INSPIRATIONAL_QUOTES[quoteIdx];

  const hideJob = (id) => setHiddenIds(prev => [...prev, id]);
  const unhideJob = (id) => setHiddenIds(prev => prev.filter(h => h !== id));

  const visibleJobs = JOBS.filter(j => !hiddenIds.includes(j.id));
  const hiddenJobs = JOBS.filter(j => hiddenIds.includes(j.id));

  const filtered = filter === "all" ? visibleJobs
    : filter === "open" ? visibleJobs.filter(j => !j.deadline || new Date(j.deadline) >= new Date("2026-04-07"))
    : filter === "new" ? visibleJobs.filter(j => j.isNew)
    : visibleJobs.filter(j => j.category === filter);

  const stats = {
    total: JOBS.length,
    open: JOBS.filter(j => !j.deadline || new Date(j.deadline) >= new Date("2026-04-07")).length,
    highMatch: JOBS.filter(j => j.matchScore >= 80).length,
    new: JOBS.filter(j => j.isNew).length,
  };

  return (
    <div style={{ maxWidth: 860, margin: "0 auto", padding: "24px 16px" }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%)",
        borderRadius: 20, padding: "28px 32px", marginBottom: 24,
        color: "white", boxShadow: "0 8px 30px rgba(99,102,241,0.3)"
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
          <div>
            <h1 style={{ fontSize: 26, fontWeight: 800, marginBottom: 4 }}>🔍 לוח משרות – מיכל זיו</h1>
            <p style={{ opacity: 0.85, fontSize: 15 }}>ברלין 2026 | זכויות אדם • מדיניות • NGO • ניהול</p>
            <p style={{ opacity: 0.7, fontSize: 12, marginTop: 6 }}>עודכן לאחרונה: {LAST_UPDATED}</p>
          </div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            {[
              { label: "סה\"כ", value: stats.total, color: "rgba(255,255,255,0.2)" },
              { label: "פתוחות", value: stats.open, color: "rgba(52,211,153,0.3)" },
              { label: "התאמה גבוהה", value: stats.highMatch, color: "rgba(251,191,36,0.3)" },
              { label: "חדשות", value: stats.new, color: "rgba(167,139,250,0.3)" }
            ].map(s => (
              <div key={s.label} style={{
                background: s.color, borderRadius: 12,
                padding: "10px 16px", textAlign: "center", minWidth: 70
              }}>
                <div style={{ fontSize: 24, fontWeight: 800 }}>{s.value}</div>
                <div style={{ fontSize: 11, opacity: 0.9 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Quote */}
      <div style={{
        background: "white", borderRadius: 14, padding: "18px 24px",
        marginBottom: 20, borderRight: "4px solid #6366f1",
        boxShadow: "0 2px 8px rgba(0,0,0,0.06)"
      }}>
        <p style={{ fontSize: 15, color: "#374151", fontStyle: "italic", lineHeight: 1.6 }}>
          💬 "{quote.text}"
        </p>
        <p style={{ fontSize: 13, color: "#6366f1", fontWeight: 700, marginTop: 6 }}>— {quote.author}</p>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {[
          { key: "all", label: "הכל" },
          { key: "open", label: "⏰ פתוחות" },
          { key: "new", label: "✨ חדשות" },
          { key: "ngo", label: "🌍 NGO" },
          { key: "social", label: "💙 חברתי" },
          { key: "education", label: "📚 חינוך" }
        ].map(f => (
          <button key={f.key} onClick={() => setFilter(f.key)} style={{
            padding: "8px 16px", borderRadius: 20, fontSize: 13, fontWeight: 600,
            cursor: "pointer", transition: "all 0.2s",
            background: filter === f.key ? "#6366f1" : "white",
            color: filter === f.key ? "white" : "#4b5563",
            border: `2px solid ${filter === f.key ? "#6366f1" : "#e5e7eb"}`
          }}>{f.label}</button>
        ))}
      </div>

      {/* Jobs List */}
      {filtered.length === 0 ? (
        <div style={{
          textAlign: "center", padding: "60px 20px",
          background: "white", borderRadius: 14, color: "#94a3b8"
        }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🔍</div>
          <p style={{ fontSize: 16 }}>לא נמצאו משרות בקטגוריה זו</p>
        </div>
      ) : (
        filtered.map(job => (
          <JobCard key={job.id} job={job} onHide={hideJob} />
        ))
      )}

      {/* Hidden jobs section */}
      {hiddenJobs.length > 0 && (
        <div style={{ marginTop: 24 }}>
          <button onClick={() => setShowHidden(!showHidden)} style={{
            background: "none", border: "1px solid #d1d5db",
            borderRadius: 8, padding: "8px 16px",
            fontSize: 13, color: "#6b7280", cursor: "pointer"
          }}>
            {showHidden ? "▲ הסתרי" : "▼ הצגי"} משרות מוסתרות ({hiddenJobs.length})
          </button>
          {showHidden && hiddenJobs.map(job => (
            <div key={job.id} style={{
              background: "#f9fafb", borderRadius: 10, padding: "12px 16px",
              marginTop: 8, display: "flex", justifyContent: "space-between",
              alignItems: "center", gap: 12
            }}>
              <div>
                <span style={{ fontWeight: 600, fontSize: 14, color: "#374151" }}>{job.title}</span>
                <span style={{ color: "#94a3b8", fontSize: 13 }}> | {job.company}</span>
              </div>
              <button onClick={() => unhideJob(job.id)} style={{
                background: "#6366f1", color: "white",
                border: "none", borderRadius: 6,
                padding: "6px 12px", fontSize: 12,
                cursor: "pointer"
              }}>שחזרי</button>
            </div>
          ))}
        </div>
      )}

      {/* Profile summary */}
      <div style={{
        background: "white", borderRadius: 14, padding: "20px 24px",
        marginTop: 24, borderTop: "3px solid #6366f1"
      }}>
        <h3 style={{ fontWeight: 700, marginBottom: 12, color: "#1e293b" }}>👤 פרופיל חיפוש</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          {[
            { label: "ניסיון", value: "10+ שנים | זכויות אדם, מדיניות, NGO" },
            { label: "שפות", value: "עברית (שפת אם) | אנגלית (שוטפת) | צרפתית (טוב)" },
            { label: "מיקום", value: "ברלין, גרמניה" },
            { label: "העדפת העסקה", value: "80% / Teilzeit (9:00–15:00) – גם משרה מלאה" },
            { label: "גרמנית", value: "❌ לא נדרשת" },
            { label: "תלוש שכר", value: "✅ Gehaltsabrechnung גרמני נדרש" }
          ].map(item => (
            <div key={item.label}>
              <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, marginBottom: 2 }}>{item.label}</div>
              <div style={{ fontSize: 14, color: "#374151" }}>{item.value}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ textAlign: "center", marginTop: 20, fontSize: 12, color: "#94a3b8" }}>
        מופעל על ידי Claude AI 🤖 | מחפש כל יום משרות חדשות עבור מיכל
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
